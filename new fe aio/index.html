<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FE AIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #050505;
  color: white;
  overflow: hidden;
}

/* Canvas background */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Support button */
.support {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 12px 18px;
  background: linear-gradient(45deg,#5865F2,#00c6ff);
  border-radius: 10px;
  cursor: pointer;
  z-index: 5;
  box-shadow: 0 0 15px #00c6ff;
}

/* Main container */
.container {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 2;
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 50px rgba(0,200,255,0.3);
}

/* Logo */
.logo {
  width: 100px;
  margin-bottom: 15px;
  border-radius: 15px;
}

/* Title */
h1 {
  font-size: 45px;
  margin-bottom: 20px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Info */
.info {
  margin: 10px 0;
  font-size: 18px;
}

/* Buttons */
.buttons {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

button {
  width: 300px;
  padding: 18px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

button:hover { transform: scale(1.1); }

/* YouTube button */
.youtube {
  background: red;
  color: white;
}
.youtube img { width: 25px; }

/* Discord button */
.discord {
  background: #5865F2;
  color: white;
}
.discord img { width: 25px; }

/* Owner button */
.owner {
  background: #111;
  border: 1px solid #00c6ff;
  box-shadow: 0 0 15px #00c6ff;
}

/* Overlay pages */
.page {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: #111;
  top: 0; left: 0;
  z-index: 50;
  color: white;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.page h2 { font-size: 35px; margin-bottom: 20px; }
.page img { width: 80px; margin-bottom: 20px; }
.page .close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 25px;
  cursor: pointer;
}

/* Loading animation */
.loading {
  font-family: monospace;
  font-size: 18px;
  margin-bottom: 20px;
  color: #00c6ff;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- Support -->
<div class="support" onclick="window.open('https://discord.gg/XBCvgX453y')">Support Server</div>

<div class="container">
  <div class="card">
    <img class="logo" src="https://cdn.discordapp.com/attachments/1472599109671059506/1483831406151995453/FCR_best_logo.jpg?ex=69bc052f&is=69bab3af&hm=3e242daec73f20d4ac316a4e2a816ebc95c9e8e283ed86732b51d3894c2cb9eb&" alt="FE AIO Logo">
    <h1>FE AIO</h1>
    <div class="info">🟢 Status: <span style="color:#00ff88;">ONLINE</span></div>
    <div class="info">👥 Users: <span id="users">2000</span>+</div>
    <div class="info">🌍 Servers: <span id="servers">2000</span>+</div>
    <div class="info">🔥 Command: <b>,help</b></div>
    <div class="info">👑 Bot made by <b>FCR 3.0</b></div>

    <div class="buttons">
      <button class="discord" onclick="clickSound(); window.open('https://discord.com/oauth2/authorize?client_id=1482686704090480720&permissions=8&integration_type=0&scope=bot')">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"> Add Me In Discord
      </button>
      <button class="youtube" onclick="clickSound(); openPage('youtubePage')">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"> YouTube
      </button>
      <button class="owner" onclick="clickSound(); openPage('ownerPage')">
        Owner DC
      </button>
    </div>
  </div>
</div>

<!-- YouTube page -->
<div id="youtubePage" class="page">
  <span class="close" onclick="closePage('youtubePage')">&times;</span>
  <div class="loading" id="ytLoading">Loading FCR 3.0...</div>
  <h2>FCR 3.0</h2>
  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube Logo">
</div>

<!-- Owner DC page -->
<div id="ownerPage" class="page">
  <span class="close" onclick="closePage('ownerPage')">&times;</span>
  <div class="loading" id="ownerLoading">Loading fcr_3.0...</div>
  <h2>fcr_3.0</h2>
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord Logo">
</div>

<!-- Click sound -->
<audio id="click" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
// Counters
let users = 2000, servers = 2000;
setInterval(()=>{
  users += Math.floor(Math.random()*5)+1;
  servers += Math.floor(Math.random()*5)+1;
  document.getElementById("users").innerText = users;
  document.getElementById("servers").innerText = servers;
},1000);

// Sound
function clickSound(){ document.getElementById("click").play(); }

// Pages
function openPage(id){
  const page = document.getElementById(id);
  page.style.display = 'flex';
  // Show loading for 1.5s then hide
  const loading = page.querySelector('.loading');
  loading.style.display='block';
  setTimeout(()=>{ loading.style.display='none'; },1500);
}
function closePage(id){
  document.getElementById(id).style.display='none';
}

// Background animation
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="#00c6ff";
    ctx.fill();
    for(let j=i+1;j<particles.length;j++){
      let dx=p.x-particles[j].x;
      let dy=p.y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.strokeStyle="rgba(0,198,255,0.2)";
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.stroke();
      }
    }
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
